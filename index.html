<!DOCTYPE html>
<html>

<head>
  <title>21 Things I Love About You 💗</title>

  <style>
    body {
      background: linear-gradient(to bottom, #ffc0cb, #ffb6d9);
      text-align: center;
      font-family: Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
      margin: 0;
      position: relative;
    }

    h1 {
      color: white;
      font-size: 52px;
      margin-top: 18px;
      text-shadow: 3px 3px 10px hotpink;
      position: relative;
      z-index: 3;
    }

    #centrePhoto {
      position: absolute;
      top: 31%;
      left: 50%;
      transform: translateX(-50%);
      width: 290px;
      background: white;
      padding: 15px;
      border-radius: 25px;
      box-shadow: 0 0 25px rgba(0,0,0,0.25);
      z-index: 1;
    }

    #centrePhoto img {
      width: 100%;
      height: 245px;
      object-fit: cover;
      border-radius: 18px;
    }

    #centrePhoto p {
      color: #ff1493;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 0;
    }

    .heart {
      position: absolute;
      width: 52px;
      height: 52px;
      background: hotpink;
      transform: rotate(45deg);
      animation: float 3s ease-in-out infinite;
      cursor: pointer;
      z-index: 2;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 52px;
      height: 52px;
      background: inherit;
      border-radius: 50%;
    }

    .heart::before {
      top: -26px;
      left: 0;
    }

    .heart::after {
      left: -26px;
      top: 0;
    }

    .heart1 { top: 16%; left: 7%; background: #ff69b4; }
    .heart2 { top: 16%; left: 20%; background: #ff1493; }
    .heart3 { top: 16%; left: 33%; background: #ff85c1; }
    .heart4 { top: 16%; left: 58%; background: #ff5fa2; }
    .heart5 { top: 16%; left: 71%; background: #ff4fa3; }
    .heart6 { top: 16%; left: 84%; background: #ff8fcf; }

    .heart7 { top: 34%; left: 5%; background: #ff5cad; }
    .heart8 { top: 34%; left: 18%; background: #ff9ed6; }
    .heart9 { top: 34%; left: 31%; background: #ff6bbf; }
    .heart10 { top: 34%; left: 64%; background: #ffaadf; }
    .heart11 { top: 34%; left: 77%; background: #ff66c4; }
    .heart12 { top: 34%; left: 90%; background: #ff80cf; }

    .heart13 { top: 53%; left: 5%; background: #ff4fa3; }
    .heart14 { top: 53%; left: 18%; background: #ff94d6; }
    .heart15 { top: 53%; left: 31%; background: #ff5ca8; }
    .heart16 { top: 53%; left: 64%; background: #ff73bf; }
    .heart17 { top: 53%; left: 77%; background: #ff99d9; }
    .heart18 { top: 53%; left: 90%; background: #ff3f9d; }

    .heart19 { top: 78%; left: 18%; background: #ff6fb9; }
    .heart20 { top: 78%; left: 48%; background: #ff85cc; }
    .heart21 { top: 78%; left: 78%; background: #ff4f9e; }

    @keyframes float {
      0% {
        transform: rotate(45deg) translateY(0px);
      }

      50% {
        transform: rotate(45deg) translateY(-14px);
      }

      100% {
        transform: rotate(45deg) translateY(0px);
      }
    }

    .number {
      position: absolute;
      color: white;
      font-size: 22px;
      font-family: cursive;
      font-weight: bold;
      z-index: 3;
      text-shadow: 2px 2px 10px hotpink;
      pointer-events: none;
    }

    #popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;

      background: rgba(0, 0, 0, 0.6);

      display: none;
      justify-content: center;
      align-items: center;

      z-index: 999;
    }

    #card {
      background: white;
      padding: 20px;
      border-radius: 20px;
      width: 350px;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 0 25px rgba(0,0,0,0.3);
    }

    #popupImage {
      width: 100%;
      max-height: 380px;
      object-fit: cover;
      border-radius: 15px;
    }

    #popupMessage {
      font-size: 20px;
      margin-top: 15px;
      color: #ff1493;
      line-height: 1.5;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      background: hotpink;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: deeppink;
    }
  </style>
</head>
